---
- name: CONTROL NODE 01
  hosts: localhost
  become: yes
  connection: local

  tasks:

    # =========================
    # SYSTEM BASE
    # =========================

    - name: Update system
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install base packages
      apt:
        name:
          - curl
          - git
          - vim
          - htop
          - openssh-server
          - ca-certificates
        state: present

    - name: Enable SSH
      systemd:
        name: ssh
        enabled: yes
        state: started


    # =========================
    # DOCKER
    # =========================

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Enable Docker
      systemd:
        name: docker
        enabled: yes
        state: started


    # =========================
    # K3S (SINGLE NODE CLUSTER)
    # =========================

    - name: Install K3s
      shell: curl -sfL https://get.k3s.io | sh -s - --write-kubeconfig-mode 644
      args:
        creates: /usr/local/bin/k3s


    # =========================
    # KUBECTL CONFIG LINK
    # =========================

    - name: Link kubeconfig
      shell: |
        mkdir -p ~/.kube
        cp /etc/rancher/k3s/k3s.yaml ~/.kube/config || true


    # =========================
    # DEPLOY OLLAMA INTO K3S
    # =========================

    - name: Deploy Ollama to Kubernetes
      shell: |
        kubectl apply -f - <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ollama
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ollama
          template:
            metadata:
              labels:
                app: ollama
            spec:
              containers:
              - name: ollama
                image: ollama/ollama
                ports:
                - containerPort: 11434
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: ollama
        spec:
          selector:
            app: ollama
          ports:
          - port: 11434
            targetPort: 11434
        EOF

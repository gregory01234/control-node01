---
- name: CONTROL NODE 01 - CLEAN SETUP
  hosts: localhost
  become: yes
  gather_facts: yes

  tasks:

    # =========================
    # SYSTEM BASE
    # =========================

    - name: Update system
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install base packages
      apt:
        name:
          - curl
          - git
          - vim
          - htop
          - openssh-server
          - python3-pip
          - ca-certificates
        state: present

    - name: Enable SSH
      systemd:
        name: ssh
        enabled: yes
        state: started


    # =========================
    # DOCKER
    # =========================

    - name: Install Docker
      shell: curl -fsSL https://get.docker.com | sh
      args:
        creates: /usr/bin/docker

    - name: Enable Docker
      systemd:
        name: docker
        enabled: yes
        state: started


    # =========================
    # K3S
    # =========================

    - name: Install K3s
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s API to be ready
      shell: kubectl get nodes
      register: k3s_ready
      retries: 20
      delay: 5
      until: k3s_ready.rc == 0


    # =========================
    # KUBECONFIG FIX
    # =========================

    - name: Ensure kubeconfig is available
      shell: |
        mkdir -p /home/dev01/.kube
        cp /etc/rancher/k3s/k3s.yaml /home/dev01/.kube/config
        chown -R dev01:dev01 /home/dev01/.kube
      args:
        creates: /home/dev01/.kube/config


    # =========================
    # PYTHON (PEP 668 SAFE)
    # =========================

    - name: Install Python system packages (NO PIP)
      apt:
        name:
          - python3-kubernetes
          - python3-requests
        state: present


    # =========================
    # KUBERNETES DEPLOY
    # =========================

    - name: Wait for Kubernetes API (hard guarantee)
      shell: kubectl get nodes
      register: k8s_check
      retries: 30
      delay: 5
      until: k8s_check.rc == 0

    - name: Deploy Ollama in Kubernetes
      shell: |
        kubectl apply -f - <<EOF
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ollama
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: ollama
          template:
            metadata:
              labels:
                app: ollama
            spec:
              containers:
              - name: ollama
                image: ollama/ollama
                ports:
                - containerPort: 11434
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: ollama
        spec:
          selector:
            app: ollama
          ports:
          - port: 11434
            targetPort: 11434
        EOF
